<!DOCTYPE html>
<html translate="no" lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Polo Loco</title>
    <link rel="stylesheet" href="style.css">
    <script src="scripts/models/audio-manager.class.js"></script>
    <script src="scripts/models/drawable-objects.class.js"></script>
    <script src="scripts/models/movable.object.class.js"></script>
    <script src="scripts/models/layers.class.js"></script>
    <script src="scripts/models/clouds.class.js"></script>
    <script src="scripts/models/character.class.js"></script>
    <script src="scripts/models/chicken.class.js"></script>
    <script src="scripts/models/chicken-small.class.js"></script>
    <script src="scripts/models/endboss.class.js"></script>
    <script src="scripts/models/status-bar.class.js"></script>
    <script src="scripts/models/health-bar-boss.class.js"></script>
    <script src="scripts/models/bottle-status-bar.class.js"></script>
    <script src="scripts/models/coin-score.class.js"></script>
    <script src="scripts/models/coin.class.js"></script>
    <script src="scripts/models/bottle.class.js"></script>
    <script src="scripts/models/world.class.js"></script>
    <script src="scripts/models/background.class.js"></script> 
    <script src="scripts/models/keyboard.class.js"></script> 
    <script src="scripts/models/level.class.js"></script>
    <script src="scripts/levels/level1.js"></script>
    <script src="scripts/models/throwable-object.class.js"></script>
    <script src="scripts/models/action-icons.class.js"></script>
    <script src="scripts/game.js"></script>
    
</head>
<body onload="init()" id="Wrapper">
    <h1>El Polo Loco</h1>

    <div id="game-container">
        <div id="action-icons">
            <button id="btn-sound" onclick="ActionIcons.toggleSound()">
                <img id="icon-sound" src="assets/img/10_icons/soundOnIcon.png" alt="Sound">
            </button>
            <button id="btn-restart" onclick="ActionIcons.restart()">
                <img src="assets/img/10_icons/restartIcon.png" alt="Restart">
            </button>
        </div>
        <canvas id="canvas" width="720" height="480">
            <button id="arrowLeft" onclick="moveLeft();"><</button>
            <button id="arrowRight" onclick="moveRight();">></button>
        </canvas>
    </div>
    
</body>
</html>
